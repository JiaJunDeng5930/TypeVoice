version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/desktop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      npm-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      npm-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      cargo-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      cargo-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      pip-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
      pip-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
