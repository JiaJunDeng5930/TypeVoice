name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Prepare FFmpeg toolchain
        run: cargo xtask toolchain ffmpeg --platform all

      - name: Build Windows installers
        working-directory: apps/desktop
        run: npm run package

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $assets = @(
            Get-ChildItem -LiteralPath "target/release/bundle/nsis" -Filter "*.exe" -File -ErrorAction Stop | Select-Object -ExpandProperty FullName
            Get-ChildItem -LiteralPath "target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction Stop | Select-Object -ExpandProperty FullName
          )

          if (($assets | Where-Object { $_ -like "*.exe" }).Count -eq 0) {
            throw "No NSIS .exe installer found."
          }
          if (($assets | Where-Object { $_ -like "*.msi" }).Count -eq 0) {
            throw "No MSI installer found."
          }

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @assets --clobber
          } else {
            gh release create $env:RELEASE_TAG @assets --verify-tag --generate-notes --title "TypeVoice $env:RELEASE_TAG"
          }
